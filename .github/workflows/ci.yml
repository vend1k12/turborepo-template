name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check, lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run check-types

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

  e2e:
    name: End-to-end smoke tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app
      BETTER_AUTH_SECRET: ci-placeholder-secret-must-be-32-characters-long
      BETTER_AUTH_URL: http://localhost:4000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run database migrations
        run: bun run db:migrate

      - name: Start all apps
        run: |
          bun run dev > /tmp/dev.log 2>&1 &
          echo "Waiting for apps to boot..."
          for port in 3000 3001 3002 3003 4000; do
            for i in $(seq 1 60); do
              if curl -sf "http://localhost:${port}" -o /dev/null \
                 || nc -z localhost "${port}"; then
                echo "port ${port} up"; break
              fi
              sleep 2
            done
          done

      - name: Run E2E smoke tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
